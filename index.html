<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RaceMap - Find Nearby Running Races</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header id="topbar">
    <div class="brand">🏃 RaceMap</div>
    <span id="status" class="status"></span>
    <button id="sidebar-toggle" type="button" aria-label="Toggle list">☰</button>
  </header>
  <main>
    <div id="map"></div>
    <aside id="sidebar">
      <div id="filters">
        <div class="filter-row">
          <label>Zip <input id="zip-input" type="text" inputmode="numeric" maxlength="5" value="29601" /></label>
          <label>Radius
            <select id="radius-select">
              <option value="10">10 mi</option>
              <option value="25">25 mi</option>
              <option value="50" selected>50 mi</option>
              <option value="100">100 mi</option>
            </select>
          </label>
          <button id="refresh-btn" type="button">Search</button>
        </div>
        <div class="filter-row">
          <label>Search <input id="filter-search" type="text" placeholder="Race name..." /></label>
        </div>
        <div class="filter-row">
          <label>Distance</label>
          <span id="dist-label" class="filter-value">0 – 100 mi</span>
        </div>
        <div class="filter-row slider-row">
          <input id="filter-dist-min" type="range" min="0" max="100" value="0" step="5" />
          <input id="filter-dist-max" type="range" min="0" max="100" value="100" step="5" />
        </div>
        <div class="filter-row">
          <label>When
            <select id="filter-date">
              <option value="">Anytime</option>
              <option value="1">Next month</option>
              <option value="3">Next 3 months</option>
              <option value="6">Next 6 months</option>
            </select>
          </label>
          <label>Type
            <select id="filter-type">
              <option value="">All types</option>
              <option value="running_race">Running race</option>
              <option value="trail_race">Trail race</option>
              <option value="ultra">Ultra</option>
              <option value="triathlon">Triathlon</option>
              <option value="duathlon">Duathlon</option>
              <option value="swim">Swim</option>
              <option value="virtual_race">Virtual</option>
              <option value="nonprofit_event">Nonprofit event</option>
              <option value="other">Other</option>
            </select>
          </label>
        </div>
        <div class="filter-row">
          <label><input id="filter-medal" type="checkbox" /> Has medal/award</label>
        </div>
      </div>
      <div id="race-list"><p class="empty">Loading...</p></div>
    </aside>
  </main>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="app.js"></script>
</body>
</html>
