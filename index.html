<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RaceMap - Find Nearby Running Races</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" crossorigin="" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" crossorigin="" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header id="topbar">
    <div class="brand">🏃 RaceMap</div>
    <span id="status" class="status"></span>
    <button id="sidebar-toggle" type="button" aria-label="Toggle list">☰ List</button>
  </header>
  <main>
    <div id="map"></div>
    <aside id="sidebar">
      <div id="filters">
        <div class="filter-group">
          <div class="filter-row">
            <input id="zip-input" type="text" inputmode="numeric" maxlength="5" value="29601" placeholder="Zip" />
            <select id="radius-select">
              <option value="10">10 mi</option>
              <option value="25">25 mi</option>
              <option value="50" selected>50 mi</option>
              <option value="100">100 mi</option>
            </select>
            <button id="refresh-btn" type="button">Search</button>
          </div>
          <button id="use-location-btn" type="button" class="use-location-btn">📍 Use my location</button>
        </div>
        <div class="filter-group">
          <input id="filter-search" type="text" placeholder="Filter by name..." class="filter-full" />
        </div>
        <div class="filter-group">
          <div class="filter-row filter-row-spread">
            <span class="filter-label">Distance</span>
            <span id="dist-label" class="filter-value">0 – 100 mi</span>
          </div>
          <div class="slider-row">
            <input id="filter-dist-min" type="range" min="0" max="100" value="0" step="5" />
            <input id="filter-dist-max" type="range" min="0" max="100" value="100" step="5" />
          </div>
        </div>
        <div class="filter-group">
          <div class="filter-row">
            <select id="filter-date">
              <option value="">When: Anytime</option>
              <option value="1">When: Next month</option>
              <option value="3">When: Next 3 months</option>
              <option value="6">When: Next 6 months</option>
            </select>
            <select id="filter-type">
              <option value="">Type: All</option>
              <option value="running_race">Running race</option>
              <option value="trail_race">Trail race</option>
              <option value="ultra">Ultra</option>
              <option value="triathlon">Triathlon</option>
              <option value="duathlon">Duathlon</option>
              <option value="swim">Swim</option>
              <option value="virtual_race">Virtual</option>
              <option value="nonprofit_event">Nonprofit</option>
              <option value="other">Other</option>
            </select>
          </div>
        </div>
      </div>
      <button id="show-map-btn" class="show-map-btn" type="button">← Show Map</button>
      <div id="race-count"></div>
      <div class="refine-row">
        <button id="refine-btn" type="button" class="refine-btn" title="Geocode race addresses for precise pin locations">📍 Refine Locations</button>
      </div>
      <div id="race-list"><p class="empty">Loading...</p></div>
    </aside>
  </main>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js" crossorigin=""></script>
  <script src="app.js"></script>
</body>
</html>
